pace;\">←<\u002Fbutton>\n        <div style=\"font-weight:700;font-size:clamp(18px,4.6vw,22px);color:#d8417f;text-shadow:2px 2px 0 #ffd5e4;\">♥ {{ monthLabel }} ♥<\u002Fdiv>\n        <button onclick=\"{{ nextM }}\" aria-label=\"Next month\" style=\"cursor:pointer;width:40px;height:40px;border-radius:10px;background:#fde3ea;border:3px solid #ef8fb4;box-shadow:0 3px 0 #ef8fb4;color:#d8417f;font-size:16px;font-weight:700;font-family:'Pixelify Sans',monospace;\">→<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"border:3px solid #f3bcd0;border-radius:10px;overflow:hidden;\">\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);background:#ec77a6;\">\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">SUN<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">MON<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">TUE<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">WED<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">THU<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">FRI<\u002Fdiv>\n          <div style=\"text-align:center;padding:8px 0;color:#fff;font-weight:600;font-size:clamp(10px,2.6vw,13px);\">SAT<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(7,1fr);background:#fffdfe;\">\n          <sc-for list=\"{{ cells }}\" as=\"cell\" hint-placeholder-count=\"35\">\n            <div style=\"position:relative;min-height:clamp(56px,13vw,66px);display:flex;align-items:center;justify-content:center;border-right:2px dashed #fbd5e2;border-bottom:2px dashed  ! = classes competing ♡<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background:#fffdfe;border:3px solid #f3bcd0;border-radius:14px;padding:clamp(12px,3vw,15px);margin-top:14px;\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:12px;\">\n        <div style=\"font-weight:700;font-size:clamp(15px,4vw,18px);color:#d8417f;text-shadow:2px 2px 0 #ffd5e4;\">✦ Upcoming slots<\u002Fdiv>\n        <div aria-hidden=\"true\" style=\"flex:1;height:3px;background:repeating-linear-gradient(90deg,#f6c3d2 0 6px,transparent 6px 12px);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasUpcoming }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <sc-for list=\"{{ upcoming }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ s.onClick }}\" aria-label=\"{{ s.dateLabel }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;text-align:left;cursor:pointer;font-family:'Pixelify Sans',monospace;background:#fff6fa;border:2px solid #f9d2e0;border-radius:10px;box-shadow:0 3px 0 #f9d2e0;padding:11px 13px;\" style-hover=\"{{ s.hoverStyle }}\">\n              <div aria-hidden=\"true\" style=\"{{ s.wrapStyle }}\"><div style=\"{{ s.heartStyle }}\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"font-weight:600;font-size:clamp(13px,3.6vw,15px);color:#c2407c;\">{{ s.dateLabel }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#a85f7d;font-weight:500;margin-top:1px;\">{{ s.time }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;flex:0 0 auto;\">\n                <div style=\"font-weight:700;font-size:12px;color:{{ s.color }};\">{{ s.statusLabel }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#a85f7d;font-weight:500;margin-top:2px;max-width:120px;text-align:right;\">{{ s.cap }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fbutto Sans',monospace;\">✕<\u002Fbutton>\n\n        <!-- SLOT HEADER -->\n        <div style=\"text-align:center;margin-bottom:14px;\">\n          <div style=\"font-weight:700;font-size:clamp(18px,5vw,21px);color:#d8417f;text-shadow:2px 2px 0 #ffd5e4;\">{{ detail.dateLabel }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:#a85f7d;font-weight:600;margin-top:3px;\">⏰ {{ detail.time }}<\u002Fdiv>\n          <div style=\"margin-top:8px;\"><span style=\"{{ detail.chipStyle }}\"><span aria-hidden=\"true\" style=\"{{ detail.chipHeartWrap }}\"><span style=\"{{ detail.chipHeart }}\"><\u002Fspan><\u002Fspan>{{ detail.statusLabel }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- CLASS PICKER -->\n        <sc-if value=\"{{ showPicker }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-weight:700;font-size:14px;color:#6b4f5b;margin-bottom:10px;text-align:center;\">Choose your class ♡<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;\">\n            <sc-for list=\"{{ classPicker }}\" as=\"c\" hint-placeholder-count=\"7\">\n              <button onclick=\"{{ c.onSelect }}\" disabled=\"{{ c.isBlocked }}\" style=\"{{ c.rowStyle }}\">\n                <div style=\"font-size:22px;flex-shrink:0;margin-top:1px;\">{{ c.emoji }}<\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:8px;\">\n                    <div style=\"font-weight:700;font-size:13.5px;color:#5b4750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"font-weight:700;font-size:12px;color:#a85f7d;white-space:nowrap;flex-shrink:0;\">{{ c.price }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"height:8px;background:#f0e8f0;border-radius:4px;overflow:hidden;margin:5px 0;\">\n                    <div style=\"{{ c.barStyle }}\"><\u002Fdiv>\n                  <\u0 placeholder-count=\"5\">\n            <div style=\"background:#faf5fe;border:2px solid #e4d2f5;border-radius:10px;padding:11px;\">\n              <div style=\"display:flex;gap:7px;align-items:center;flex-wrap:wrap;\">\n                <input value=\"{{ c.emoji }}\" onchange=\"{{ c.onEmoji }}\" maxlength=\"2\" style=\"width:46px;text-align:center;font-family:'Pixelify Sans',monospace;font-size:18px;border:2px solid #e4d2f5;border-radius:8px;padding:7px 4px;background:#fff;\">\n                <input value=\"{{ c.name }}\" onchange=\"{{ c.onName }}\" style=\"flex:1;min-width:130px;font-family:'Pixelify Sans',monospace;font-weight:600;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:9px 11px;background:#fff;\">\n                <div style=\"display:flex;align-items:center;gap:4px;color:#9a7fb0;font-weight:600;font-size:13px;\">$<input value=\"{{ c.price }}\" onchange=\"{{ c.onPrice }}\" type=\"number\" min=\"0\" style=\"width:60px;font-family:'Pixelify Sans',monospace;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:9px 8px;background:#fff;\"><\u002Fdiv>\n                <button onclick=\"{{ c.onDelete }}\" aria-label=\"Delete\" style=\"cursor:pointer;width:34px;height:34px;border-radius:8px;background:#fde3ea;border:2px solid #ef8fb4;color:#d8417f;font-size:13px;font-weight:700;font-family:'Pixelify Sans',monospace;\">✕<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"margin-top:8px;font-size:12.5px;font-weight:600;\">\n                <sc-if value=\"{{ c.foundation }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:#3f8a59;background:#ecf8ef;border:2px solid #c9e8d2;border-radius:7px;padding:4px 9px;\">✓ Foundation · open to all<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ c.notFoundation }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ c.onToggleReq }}\" style=\"cursor:pointer;font-family:'Pixelify Sans',monospace;font-weight:600;font-size:12.5px; reakpoint }}\" onchange=\"{{ updPcBreakpoint }}\" type=\"number\" min=\"2\" max=\"5\" style=\"width:50px;font-family:'Pixelify Sans',monospace;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:8px 6px;background:#fff;\"> people<\u002Flabel>\n        <\u002Fdiv>\n\n        <!-- SUPABASE -->\n        <div style=\"margin-top:20px;font-weight:700;font-size:15px;color:#8a5cc4;\">🔐 Supabase (class history)<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9a7fb0;font-weight:500;margin-top:3px;\">Stores who's completed which class by email. Run this SQL in Supabase → SQL Editor first:<\u002Fdiv>\n        <div style=\"margin-top:7px;background:#1e1e2e;border-radius:8px;padding:10px 13px;font-size:11px;color:#cba6f7;font-family:monospace;line-height:1.6;overflow-x:auto;white-space:pre;\">create table completions (\n  id uuid primary key default gen_random_uuid(),\n  email text not null,\n  name text,\n  class_id text not null,\n  added_at timestamptz default now(),\n  unique(email, class_id)\n);\nalter table completions enable row level security;\ncreate policy \"insert\" on completions for insert with check (true);\ncreate policy \"select\" on completions for select using (true);<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9a7fb0;font-weight:500;margin-top:14px;\">Stores the live calendar (slots &amp; bookings) so everyone sees the same thing — no more re-uploading HTML each month! Run this SQL too:<\u002Fdiv>\n        <div style=\"margin-top:7px;background:#1e1e2e;border-radius:8px;padding:10px 13px;font-size:11px;color:#cba6f7;font-family:monospace;line-height:1.6;overflow-x:auto;white-space:pre;\">create table slots (\n  id text primary key,\n  day int not null,\n  month int not null,\n  year int not null,\n  time text not null,\n  queues jsonb default '{}'::jsonb,\n  locked_class_id text,\n  pc_count int default 0,\n  pc_locked boolean default false,\n  updated_at timestamptz default now()\n);\nalter table slots enable row level security;\ncreate policy \"select\" on slots for select using (true);\ncreate policy \"insert\" on slots for insert with check (true);\ncreate policy \"update\" on slots for update using (true);\ncreate policy \"delete\" on slots for delete using (true);<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:12px;color:#4a7a47;font-weight:600;background:#eef7ee;border:2px solid #b8d5b3;border-radius:8px;padding:8px 11px;\">{{ slotsSyncStatus }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:9px;\">\n          <input value=\"{{ supabaseUrl }}\" onchange=\"{{ updSupabaseUrl }}\" aria-label=\"Supabase URL\" placeholder=\"https://xxxx.supabase.co\" style=\"width:100%;font-family:'Pixelify Sans',monospace;font-size:13px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:10px 12px;background:#fff;\">\n          <input value=\"{{ supabaseKey }}\" onchange=\"{{ updSupabaseKey }}\" aria-label=\"Supabase anon key\" placeholder=\"eyJ… anon key\" type=\"password\" style=\"width:100%;font-family:'Pixelify Sans',monospace;font-size:13px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:10px 12px;background:#fff;\">\n        <\u002Fdiv>\n        <div style=\"margin-top:6px;font-size:11.5px;color:#b0a0c0;font-weight:500;\">Found in Supabase → Project Settings → API<\u002Fdiv>\n\n        <!-- PAST ATTENDEES -->\n        <div style=\"margin-top:20px;font-weight:700;font-size:15px;color:#8a5cc4;\">🎓 Past Attendees<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9a7fb0;font-weight:500;margin-top:3px;\">Already attended a class? Add them here so their advanced workshops unlock automatically. ♡<\u002Fdiv>\n        <div style=\"background:#faf5fe;border:2px solid #e4d2f5;border-radius:10px;padding:12px 14px;margin-top:9px;display:flex;flex-direction:column;gap:9px;\">\n          <input value=\"{{ adminPastName }}\" onchange=\"{{ updPastName }}\" aria-label=\"Name\" placeholder=\"Their name ♡\" style=\"width:100%;font-family:'Pixelify Sans',monospace;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:9px 11px;background:#fff;\">\n          <input value=\"{{ adminPastEmail }}\" onchange=\"{{ updPastEmail }}\" aria-label=\"Email\" type=\"email\" placeholder=\"Email they signed up with ✉\" style=\"width:100%;font-family:'Pixelify Sans',monospace;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:9px 11px;background:#fff;\">\n          <div style=\"position:relative;\">\n            <select value=\"{{ adminPastClassId }}\" onchange=\"{{ updPastClass }}\" aria-label=\"Completed class\" style=\"appearance:none;-webkit-appearance:none;width:100%;font-family:'Pixelify Sans',monospace;font-weight:600;font-size:14px;color:#5b4750;border:2px solid #e4d2f5;border-radius:8px;padding:9px 36px 9px 11px;background:#fff;cursor:pointer;\">\n              <sc-for list=\"{{ adminPastClasses }}\" as=\"pc\" hint-placeholder-count=\"5\">\n                <option value=\"{{ pc.value }}\">{{ pc.label }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n            <span aria-hidden=\"true\" style=\"position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:#9159c8;font-size:12px;\">▾<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ addPastAttendee }}\" style=\"cursor:pointer;font-family:'Pixelify Sans',monospace;font-weight:700;font-size:14px;color:#fff;background:#9f7edc;border:none;border-radius:8px;padding:10px;box-shadow:0 3px 0 #7b5cc0;\">✦ Mark as completed<\u002Fbutton>\n          <sc-if value=\"{{ adminPastMsg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12px;font-weight:600;color:#8a5cc4;text-align:center;padding:6px 10px;background:#f4ecfb;border-radius:7px;\">{{ adminPastMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- FORMSPREE -->\n        <div style=\"margin-top:20px;font-weight:70 ;padding:13px;border:none;border-radius:11px;background:#b98fe0;box-shadow:0 5px 0 #9a6fd0;\">Done ♡<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- NEWSLETTER MODAL -->\n  <sc-if value=\"{{ showNewsletter }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeNewsletter }}\" style=\"position:fixed;inset:0;z-index:55;background:rgba(216,65,127,.32);display:flex;align-items:center;justify-content:center;padding:16px;\">\n      <div role=\"dialog\" aria-modal=\"true\" onclick=\"{{ stop }}\" style=\"position:relative;width:min(380px,94vw);background:#fffdfe;border:5px solid #ef8fb4;border-radius:16px;padding:clamp(20px,6vw,26px);box-shadow:0 10px 0 rgba(239,143,180,.5);animation:pop .24s ease;text-align:center;\">\n        <button onclick=\"{{ closeNewsletter }}\" style=\"position:absolute;top:14px;right:14px;width:34px;height:34px;cursor:pointer;border-radius:8px;background:#fde3ea;border:3px solid #ef8fb4;box-shadow:0 3px 0 #ef8fb4;color:#d8417f;font-size:14px;font-weight:700;font-family:'Pixelify Sans',monospace;\">✕<\u002Fbutton>\n        <sc-if value=\"{{ nlForm }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:36px;\">💌<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:21px;color:#d8417f;margin-top:4px;text-shadow:2px 2px 0 #ffd5e4;\">Amioki Heart-to-Heart<\u002Fdiv>\n          <div style=\"font-size:13px;color:#a85f7d;font-weight:500;margin-top:8px;line-height:1.5;\">Cute updates, new classes &amp; yarn drops. No spam, pinky promise. ♡<\u002Fdiv>\n          <input value=\"{{ nlEmail }}\" onchange=\"{{ updNl }}\" type=\"email\" placeholder=\"Your email ✉\" style=\"margin-top:16px;width:100%;font-family:'Pixelify Sans',monospace;font-weight:500;font-size:15px;color:#5b4750;border:3px solid #f6c3d2;border-radius:10px;padding:12px 15px;background:#fff;\">\n          <button onclick=\"{{ subscribeNewsletter }}\" style=\"margin-top:13px;width:100%;cursor:pointer;font-family:'Pixelify Sans',monospace;font-weight:700;font-size:16px;color:#fff;padding:13px;border:none;border-radius:11px;background:#ff6fae;box-shadow:0 5px 0 #e3508f;\">Subscribe ♡<\u002Fbutton>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ newsletterDone }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:44px;animation:pop .5s ease;\">💌<\u002Fdiv>\n          <div style=\"font-weight:700;font-size:21px;color:#d8417f;margin-top:8px;text-shadow:2px 2px 0 #ffd5e4;\">You're on the list!<\u002Fdiv>\n          <button onclick=\"{{ closeNewsletter }}\" style=\"margin-top:16px;cursor:pointer;font-family:'Pixelify Sans',monospace;font-weight:700;font-size:15px;color:#fff;padding:12px 28px;border:none;border-radius:11px;background:#ff6fae;box-shadow:0 5px 0 #e3508f;\">Yay ♡<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:1200}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.MIN=3; this.MAX=6; this.PC_MAX=5;\n    // require exactly ?manage=1 or #manage=1 — prevents false match on site names containing \"manage\"\n    this.IS_OWNER=typeof window!=='undefined'&&(window.location.search.includes('manage=1')||window.location.hash==='#manage=1');\n    this.KEY='amioki_v2';\n    this.HEART=[\"011000110\",\"111101111\",\"111111111\",\"111111111\",\"011111110\",\"001111100\",\"000111000\",\"000010000\"];\n    const defClasses=[\n      {id:'rock-solid', name:'Rock Solid Foundations', emoji:'🧶', price:45, foundation:true,  needsPrereq:false},\n      {id:'animals',    name:'Amigurumi Animals',       emoji:'🐻', price:55, foundation:false, needsPrereq:true},\n      {id:'sweets',     name:'Tiny Treats & Sweets',    emoji:'🍰', price:55, foundation:false, needsPrereq:true},\n      {id:'creatures',  name:'Magical Creatures',       emoji:'🦄', price:60, foundation:false, needsPrereq:true},\n      {id:'wearables',  name:'Wearables & Accessories', emoji:'🧣', price:55, foundation:false, needsPrereq:true},\n    ];\n    // Slots: {id, day, time, queues:{classId:count, 'pw:classId':count}, lockedClassId, pcCount, pcLocked}\n    const defSlots=[\n      {id:'s6',  day:6,  month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{wearables:4},               lockedClassId:'wearables',    pcCount:0, pcLocked:false},\n      {id:'s8',  day:8,  month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{animals:1,'pw:animals':1},   lockedClassId:null,           pcCount:0, pcLocked:false},\n      {id:'s10', day:10, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{'rock-solid':2},             lockedClassId:null,           pcCount:0, pcLocked:false},\n      {id:'s13', day:13, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{animals:1},                  lockedClassId:null,           pcCount:0, pcLocked:false},\n      {id:'s15', day:15, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{},                           lockedClassId:null,           pcCount:1, pcLocked:false},\n      {id:'s17', day:17, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{},                           lockedClassId:null,           pcCount:0, pcLocked:false},\n      {id:'s20', day:20, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{sweets:6},                   lockedClassId:'sweets',       pcCount:0, pcLocked:false},\n      {id:'s22', day:22, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{},                           lockedClassId:null,           pcCount:3, pcLocked:false},\n      {id:'s24', day:24, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{'rock-solid':5},             lockedClassId:'rock-solid',   pcCount:0, pcLocked:false},\n      {id:'s27', day:27, month:5, year:2026, time:'2:00 PM \\u2013 4:30 PM', queues:{'pw:creatures':4},           lockedClassId:'pw:creatures', pcCount:0, pcLocked:false},\n    ];\n    let saved=null;\n    try{ saved=JSON.parse(localStorage.getItem(this.KEY)||'null'); }catch(e){}\n    this.state={\n      loggedIn:false, userName:'', completed:false,\n      year:2026, month:5,\n      classes:(saved&&saved.classes)||defClasses,\n      slots:(saved&&saved.slots)||defSlots,\n      selectedId:null, selectedClassId:null, selectedPwClassId:null,\n      mounted:false, showLogin:false,  showAdmin:false, showAdminPw:false, showNewsletter:false, newsletterDone:false,\n      adminPwInput:'', adminPwError:'', adminNewPw:'', adminNewPwMsg:'',\n      adminPassword:(saved&&saved.adminPassword)||'', adminAuthed:false,\n      step:null, fName:'', fEmail:'', nlEmail:'', lastOutcome:null, pcPreferredTime:'',\n      privateRates:(saved&&saved.privateRates)||{rate1:20,rate2:18,breakpoint:3},\n      notifyEmails:(saved&&saved.notifyEmails)||['amioki.co@gmail.com','sydni@amioki.co'],\n      formspreeUrl:(saved&&saved.formspreeUrl)||'',\n      supabaseUrl:(saved&&saved.supabaseUrl)||'',\n      supabaseKey:(saved&&saved.supabaseKey)||'',\n      completedClasses:(saved&&saved.completedClasses)||[],\n      pdfMode:'upload', pdfText:'', pdfResults:[], pdfParsing:false, pdfError:'',\n      pdfMonth:5, pdfYear:2026,\n      loginEmail:'', loginName:'', loginError:'', loginLoading:false,\n      adminPastName:'', adminPastEmail:'', adminPastClassId:'rock-solid', adminPastMsg:'',\n      pwIsOrganizer:false, pcGroupSize:1, pcSelectedSlot:'',\n    };\n  }\n  componentDidMount(){\n    this._onKey=(e)=>{ if(e.key!=='Escape') return; const s=this.state;\n      if(s.showAdmin) this.setState({showAdmin:false});\n      else if(s.showLogin) this.setState({showLogin:false});\n      else if(s.selectedId) this.setState({selectedId:null,selectedClassId:null,selectedPwClassId:null,step:null,lastOutcome:null}); };\n    document.addEventListener('keydown',this._onKey);\n  }\n  componentDidMount(){\n    // Small delay so modals never flash during hydration\n    setTimeout(()=>{\n      this.setState({mounted:true,showAdmin:false,showAdminPw:false,adminAuthed:false});\n      if(this.getSupabase()){\n        this.syncSlotsFromRemote();\n        this._slotPoll=setInterval(()=>this.syncSlotsFromRemote(),15000);\n      }\n    },50);\n  }\n  slotToRow(s){ return {id:s.id,day:s.day,month:s.month!=null?s.month:5,year:s.year||2026,time:s.time,queues:s.queues||{},locked_class_id:s.lockedClassId||null,pc_count:s.pcCount||0,pc_locked:!!s.pcLocked}; }\n  rowToSlot(r){ return {id:r.id,day:r.day,month:r.month,year:r.year,time:r.time,queues:r.queues||{},lockedClassId:r.locked_class_id||null,pcCount:r.pc_count||0,pcLocked:!!r.pc_locked}; }\n  async fetchSlotsRemote(){\n    const sb=this.getSupabase(); if(!sb) return null;\n    try{\n      const {data,error}=await sb.from('slots').select('*');\n      if(error||!data) return null;\n      return data.map(r=>this.rowToSlot(r));\n    }catch(e){ return null; }\n  }\n  async pushSlot(slot){\n    const sb=this.getSupabase(); if(!sb||!slot) return;\n    try{ await sb.from('slots').upsert(this.slotToRow(slot)); }catch(e){}\n  }\n  async pushAllSlots(slots,removedIds){\n    const sb=this.getSupabase(); if(!sb) return;\n    try{\n      if(slots&&slots.length) await sb.from('slots').upsert(slots.map(s=>this.slotToRow(s)));\n      if(removedIds&&removedIds.length) await sb.from('slots').delete().in('id',removedIds);\n    }catch(e){}\n  }\n  async syncSlotsFromRemote(){\n    const sb=this.getSupabase(); if(!sb) return;\n    if(this.state.showAdmin) return; // don't clobber in-progress admin edits\n    const remote=await this.fetchSlotsRemote();\n    if(remote===null) return;\n    if(remote.length>0){\n      this.setState({slots:remote,slotsSyncedAt:Date.now()});\n      try{ const saved=JSON.parse(localStorage.getItem(this.KEY)||'{}'); saved.slots=remote; localStorage.setItem(this.KEY,JSON.stringify(saved)); }catch(e){}\n    } else {\n      this.pushAllSlots(this.state.slots,[]);\n    }\n  }\n  componentWillUnmount(){ if(this._slotPoll) clearInterval(this._slotPoll); if(this._onKey) document.removeEventListener('keydown',this._onKey); }\n  persist(classes,slots){\n    const st=this.state;\n    try{ localStorage.setItem(this.KEY,JSON.stringify({classes,slots,notifyEmails:st.notifyEmails,privateRates:st.privateRates,formspreeUrl:st.formspreeUrl,supabaseUrl:st.supabaseUrl,supabaseKey:st.supabaseKey,completedClasses:st.completedClasses,adminPassword:st.adminPassword})); }catch(e){}\n  }\n  parsePcSlots(timeStr){\n    if(!timeStr) return [];\n    const parts=timeStr.split(/[–\\-]/).map(s=>s.trim()).filter(Boolean);\n    if(parts.length<2) return [];\n    const parseT=(s)=>{ const m=s.match(/(\\d+):(\\d+)\\s*(AM|PM)/i); if(!m) return null; let h=parseInt(m[1]); const min=parseInt(m[2]); const ap=m[3].toUpperCase(); if(ap==='PM'&&h!==12) h+=12; if(ap==='AM'&&h===12) h=0; return h*60+min; };\n    const fmtT=(mins)=>{ let h=Math.floor(mins/60); const m=mins%60; const ap=h>=12?'PM':'AM'; if(h>12) h-=12; if(h===0) h=12; return h+':'+(m<10?'0':'')+m+' '+ap; };\n    const start=parseT(parts[0]); const end=parseT(parts[1]);\n    if(start===null||end===null||start>=end) return [];\n    const slots=[]; for(let t=start;t+60<=end;t+=60){ const v=fmtT(t)+' – '+fmtT(t+60); slots.push({key:v,value:v,label:v}); }\n    return slots;\n  }\n  getSupabase(){\n    const supabaseUrl=(this.state.supabaseUrl||'').trim();\n    const supabaseKey=(this.state.supabaseKey||'').trim();\n    if(!supabaseUrl||!supabaseKey) return null;\n    if(window.__amiokiSB&&window.__amiokiSBUrl===supabaseUrl+supabaseKey.length) return window.__amiokiSB;\n    try{\n      const sb=window.supabase.createClient(supabaseUrl,supabaseKey);\n      window.__amiokiSB=sb; window.__amiokiSBUrl=supabaseUrl+supabaseKey.length; return sb;\n    }catch(e){ return null; }\n  }\n  async fetchCompletedClasses(sb,email){\n    try{\n      const {data,error}=await sb.from('completions').select('class_id').eq('email',email.toLowerCase().trim());\n      if(error) return [];\n      return (data||[]).map(r=>r.class_id);\n    }catch(e){ return []; }\n  }\n  async recordCompletedClass(classId){\n    const st=this.state;\n    const email=(st.loginEmail||st.fEmail||'').toLowerCase().trim();\n    const name=st.userName||st.fName||'';\n    const completed=[...new Set([...(st.completedClasses||[]),classId])];\n    this.setState({completedClasses:completed});\n    try{ const saved=JSON.parse(localStorage.getItem(this.KEY)||'{}'); saved.completedClasses=completed; localStorage.setItem(this.KEY,JSON.stringify(saved)); }catch(e){}\n    const sb=this.getSupabase(); if(!sb||!email) return;\n    try{ await sb.from('completions').upsert({email,name,class_id:classId},{onConflict:'email,class_id'}); }catch(e){}\n  }\n  async addPastAttendee(name,email,classId){\n    const sb=this.getSupabase();\n    if(!sb) return {ok:false,msg:'Add Supabase credentials in Manage first \\u2665'};\n    try{\n      const {error}=await sb.from('completions').upsert({email:email.toLowerCase().trim(),name,class_id:classId},{onConflict:'email,class_id'});\n      if(error) return {ok:false,msg:error.message};\n      return {ok:true,msg:name+' marked as completed \\u2665'};\n    }catch(e){\n      const reason=(e&&e.message&&e.message.includes('fetch'))?'Could not reach Supabase \\u2014 check the URL for typos, and confirm your project isn\\u2019t paused in the Supabase dashboard.':('Error: '+(e&&e.message?e.message:'check Supabase config.'));\n      return {ok:false,msg:reason};\n    }\n  }\n  notify(event,payload){\n    const url=this.state.formspreeUrl;\n    if(url){ fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({_subject:'Amioki: '+event.replace(/_/g,' '),event,...payload})}).catch(()=>{}); }\n    const r=this.state.notifyEmails||[];\n    try{ console.log('[Amioki notify]',event,r,payload); }catch(e){}\n  }\n  cls(id){ return (this.state.classes||[]).find(c=>c.id===id)||{nam
